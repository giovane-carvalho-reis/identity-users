spring:
  application:
    name: identity-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/identity}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:senha123}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Em Docker o serviço valida o token usando a URL interna do container.
          # Em local (fora do Docker) sobrescreva via variável de ambiente.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8093/realms/identity}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8093/realms/identity/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:9292}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
  tracing:
    enabled: false

info:
  app:
    name: Identity Service
    description: Gerenciamento de usuários com autenticação via Keycloak
    ambiente: local-demo

logging:
  level:
    root: INFO
    com.identity: DEBUG

app:
  keycloak:
    base-url: ${KEYCLOAK_BASE_URL:http://localhost:8093}
    realm: ${KEYCLOAK_REALM:identity}
    admin:
      realm: ${KEYCLOAK_ADMIN_REALM:master}
      username: ${KEYCLOAK_ADMIN_USERNAME:admin}
      password: ${KEYCLOAK_ADMIN_PASSWORD:admin123}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    token:
      client-id: ${KEYCLOAK_TOKEN_CLIENT_ID:identity-public-client}

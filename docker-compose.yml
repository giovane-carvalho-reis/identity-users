# =============================================================================
#  Identity Service — ambiente local / demo
#  Subir tudo:  docker compose up --build
#  Derrubar:    docker compose down -v
# =============================================================================
#
#  Portas expostas
#  ┌─────────────────────────────────────┬──────┐
#  │ PostgreSQL                          │ 5432 │
#  │ Keycloak (console: /admin)          │ 8093 │
#  │ Identity Service (API)              │ 9292 │
#  └─────────────────────────────────────┴──────┘
#
#  Credenciais Keycloak admin
#    url:   http://localhost:8093
#    user:  admin / admin123
#    realm: identity  |  client: identity-public-client
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Banco de dados
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: identity-postgres
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Keycloak — Identity Provider
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: identity-keycloak
    command:
      - start-dev
      - --import-realm
      - --hostname=http://localhost:8093
      - --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: identity
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: senha123
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
    ports:
      - "8093:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # /health/ready retorna 200 apenas quando o Keycloak terminou de subir
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  # ---------------------------------------------------------------------------
  # keycloak-config — configurações pós-import (roda uma vez e sai)
  # Usa script externo para evitar problemas de CRLF do Windows em YAML multiline.
  # ---------------------------------------------------------------------------
  keycloak-config:
    image: quay.io/keycloak/keycloak:26.1
    container_name: identity-keycloak-config
    entrypoint: ["/bin/bash", "/scripts/keycloak-config.sh"]
    volumes:
      - ./docker/keycloak:/scripts
    depends_on:
      keycloak:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Identity Service — API Spring Boot
  # ---------------------------------------------------------------------------
  identity-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: identity-service
    environment:
      SERVER_PORT: 9292
      DATABASE_URL: jdbc:postgresql://postgres:5432/identity
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: senha123
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
      KEYCLOAK_TOKEN_CLIENT_ID: identity-public-client
      # issuer-uri = URL que o Keycloak grava no campo "iss" do JWT (definida pelo --hostname).
      # Precisa ser idêntica ao "iss" do token para a validação passar.
      # jwk-set-uri = URL interna usada para buscar as chaves públicas (dentro da rede Docker).
      KEYCLOAK_ISSUER_URI: http://localhost:8093/realms/identity
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/identity/protocol/openid-connect/certs
    ports:
      - "9292:9292"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully  # user profile já está configurado

volumes:
  postgres_data:
